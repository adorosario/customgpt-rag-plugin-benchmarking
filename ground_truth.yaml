hard_needles:
  - id: needle_1
    question: "When did Sarah from Legal say the patent filing deadline was moved to, and who did she tell?"
    required_facts:
      - "April 15"
      - "Sarah"
    partial_facts:
      - "patent filing"
      - "deadline"
    first_appears_at: 500

  - id: needle_2
    question: "What was the revised Q3 revenue projection from Finance?"
    required_facts:
      - "4.2"
      - "Finance"
    partial_facts:
      - "revenue"
      - "Q3"
    first_appears_at: 1000

  - id: needle_3
    question: "What database did Engineering approve migrating to, and on what date?"
    required_facts:
      - "PostgreSQL 16"
      - "September 3"
    partial_facts:
      - "migration"
      - "database"
    first_appears_at: 2500

  - id: needle_4
    question: "When do the remote work policy changes take effect?"
    required_facts:
      - "January 1"
      - "2026"
    partial_facts:
      - "remote work"
      - "policy"
    first_appears_at: 5000

  - id: needle_5
    question: "How much is the CloudScale vendor contract renewal per year?"
    required_facts:
      - "85,000"
      - "CloudScale"
    partial_facts:
      - "vendor"
      - "contract"
    first_appears_at: 10000

