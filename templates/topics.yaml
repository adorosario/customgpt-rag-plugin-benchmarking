topics:
  Engineering:
    - subject_template: "Re: {component} performance regression in {version}"
      body_template: |
        {greeting},

        I ran the benchmarks on {component} after the {version} release and we're seeing a
        significant regression. Average response time has climbed from {threshold} to
        {current_value}, which puts us well outside our target SLA for this service.

        The profiling data points to the new serialization layer as the likely culprit. When
        I disabled the feature flag and re-ran the suite, numbers returned to baseline. I've
        opened a ticket and assigned it to {assignee} for deeper investigation.

        We should decide whether to roll back {version} in production or push a targeted fix.
        My recommendation is a hotfix — the regression is isolated to one code path and
        shouldn't take more than a day to resolve. But I'd like the team's input before we
        commit to a direction.

        Can we get 30 minutes on the calendar today to discuss?

        {sign_off}
      tone: urgent
      is_reply: true
      tags: ["performance", "engineering", "incident"]

    - subject_template: "Deploy plan for {component} {version}"
      body_template: |
        {greeting},

        Here's the deployment plan for {component} {version}. I've coordinated with
        {assignee} on the rollout sequence and we're targeting {date} for the production push.

        Deployment order: staging first for smoke tests, then canary at 5%, ramp to 25%
        after one hour of clean metrics, then full rollout. The estimated total deployment
        window is two hours.

        Key changes in this release include the refactored {subsystem} module, updated
        dependency versions, and the new health check endpoint. All changes have been through
        code review and the CI pipeline is green.

        Rollback plan: if error rates exceed {threshold} at any stage, we revert to the
        previous release using the blue-green swap. {assignee} will be on-call during the
        window.

        Please confirm you've reviewed the changelog and flag any concerns before {date}.

        {sign_off}
      tone: formal
      is_reply: false
      tags: ["deployment", "engineering", "release"]

    - subject_template: "{component} code review — PR #{version}"
      body_template: |
        {greeting},

        I've submitted a pull request for the {component} changes we discussed last sprint.
        PR #{version} is ready for review and I've tagged {assignee} as the primary reviewer.

        Summary of changes: refactored the {subsystem} to reduce coupling with the data
        layer, added unit tests covering the edge cases we identified during the incident
        last week, and updated the API documentation to reflect the new response format.

        The test suite passes locally and in CI. Coverage for the affected files went from
        {threshold} to {current_value}. I've also added integration tests for the two
        most critical user flows.

        One thing I'd like specific feedback on is the error handling approach in the
        {subsystem} module — I went with explicit error types instead of generic exceptions.
        Let me know if you think that's the right tradeoff for this codebase.

        {sign_off}
      tone: casual
      is_reply: false
      tags: ["code-review", "engineering"]

    - subject_template: "Incident postmortem — {component} outage on {date}"
      body_template: |
        {greeting},

        Attached is the postmortem for the {component} outage that occurred on {date}. The
        incident lasted approximately 45 minutes and affected {metric} for a subset of users.

        Root cause: a configuration change in the {subsystem} deployment introduced a race
        condition under high load. The issue manifested when concurrent requests exceeded
        {threshold}, causing connection pool exhaustion.

        Timeline: the alert fired at 14:23 UTC, {assignee} acknowledged within 3 minutes,
        and the fix was deployed by 15:08 UTC. Detection was fast thanks to the new alerting
        rules, but resolution took longer than ideal because the runbook for this service
        was outdated.

        Action items: update the {component} runbook, add a circuit breaker for the
        {subsystem} connection pool, and implement load shedding when concurrency exceeds
        {threshold}. I've created tickets for all three.

        Please review and add any corrections by end of week.

        {sign_off}
      tone: formal
      is_reply: false
      tags: ["incident", "postmortem", "engineering"]

    - subject_template: "Architecture RFC — {component} redesign proposal"
      body_template: |
        {greeting},

        I've drafted an RFC for redesigning the {component} architecture. The current
        implementation has served us well but is hitting scaling limits — we're seeing
        {metric} degrade as data volume grows past {threshold}.

        The proposal introduces a new {subsystem} layer that decouples read and write paths.
        Writes go through an event queue and are processed asynchronously, while reads hit a
        materialized view that's optimized for our most common query patterns.

        Estimated effort is 4-6 sprints for the core migration, with {assignee} leading the
        implementation. I've outlined the phased rollout approach in the document — we can
        run the old and new systems in parallel during the transition.

        Tradeoffs: increased operational complexity and a new dependency on the message
        broker, but we get horizontal scalability and the ability to support the load
        projections for next year.

        RFC is in Confluence. Please leave comments by {date} so we can discuss at the
        next architecture review.

        {sign_off}
      tone: formal
      is_reply: false
      tags: ["architecture", "engineering", "rfc"]

    - subject_template: "Re: {component} — tech debt prioritization"
      body_template: |
        {greeting},

        Following up on the tech debt discussion from yesterday's sprint planning. I've
        categorized the outstanding items for {component} into three tiers based on risk
        and effort.

        High priority: the deprecated {subsystem} dependency needs to be replaced before
        {date} when upstream support ends. This is roughly a {metric} effort and {assignee}
        has volunteered to own it.

        Medium priority: the test coverage gap in the {component} integration layer. We're
        at {current_value} coverage but our target is {threshold}. Filling this gap would
        have caught the regression we saw last sprint.

        Low priority: the logging format standardization. It's annoying but not blocking
        anything. I'd suggest we tackle it opportunistically when someone is already
        touching those files.

        My proposal is to allocate {percent} of next sprint's capacity to the high-priority
        item. Thoughts?

        {sign_off}
      tone: casual
      is_reply: true
      tags: ["tech-debt", "engineering", "planning"]

    - subject_template: "Security audit findings — {component}"
      body_template: |
        {greeting},

        The security audit for {component} is complete and I wanted to share the findings
        before the full report goes out. Overall the results are positive but there are two
        items that need immediate attention.

        Finding 1: the {subsystem} endpoint accepts input without proper validation on the
        length parameter. While the risk is mitigated by our WAF rules, we should add
        server-side validation as defense in depth. {assignee} is already working on a fix.

        Finding 2: API tokens for the {component} service are not being rotated on schedule.
        Several tokens are over {threshold} days old. We need to implement automated rotation
        and add alerting when tokens approach expiry.

        No critical vulnerabilities were found, which is great. The audit also noted that our
        dependency scanning is catching {percent} of known CVEs within 48 hours, which is
        above industry average.

        I'll schedule a review meeting for {date} to walk through the remediation plan.

        {sign_off}
      tone: formal
      is_reply: false
      tags: ["security", "engineering", "audit"]

    - subject_template: "Sprint {version} retrospective notes"
      body_template: |
        {greeting},

        Here are the retrospective notes from sprint {version}. Thanks to everyone who
        participated — we had good engagement this time.

        What went well: the {component} feature shipped on time, {assignee} did an excellent
        job coordinating the cross-team dependency, and our CI pipeline reliability improved
        to {current_value} from {threshold} last sprint.

        What could improve: we underestimated the {subsystem} integration work by about
        {percent}, which pushed two stories into the next sprint. We also had too many
        context switches mid-sprint from unplanned support requests.

        Action items: establish a support rotation so on-call duties don't fall on the same
        people, and break down large stories into smaller increments to improve estimation
        accuracy. {assignee} volunteered to draft the rotation schedule.

        Sprint {version} velocity was {metric} points. Carrying over 8 points of unfinished
        work to the next sprint.

        {sign_off}
      tone: casual
      is_reply: false
      tags: ["sprint", "retrospective", "engineering"]

    - subject_template: "On-call handoff — week of {date}"
      body_template: |
        {greeting},

        Handing off on-call duties for the week of {date}. Here's the status summary for
        the incoming rotation.

        Active issues: the {component} service has been showing elevated latency during peak
        hours, averaging {current_value} against a target of {threshold}. We've identified
        the root cause in the {subsystem} caching layer and a fix is in code review now.
        Should be deployed by Tuesday.

        Monitoring: keep an eye on the {component} dashboard. {assignee} added new alerts
        last week but we haven't validated them under real load yet. If you get paged for
        the {subsystem} alert, the runbook is updated and the escalation path is documented.

        Scheduled maintenance: there's a planned database maintenance window on Thursday at
        02:00 UTC. Expected duration is {metric} minutes. The procedure is automated but
        someone needs to verify the health checks afterward.

        Reach out if anything comes up that isn't covered in the runbook.

        {sign_off}
      tone: casual
      is_reply: false
      tags: ["on-call", "engineering", "operations"]

    - subject_template: "Re: {component} migration to {subsystem} — status update"
      body_template: |
        {greeting},

        Quick update on the {component} migration to {subsystem}. We're about {percent}
        through the planned work and tracking to finish by {date}.

        Completed this week: migrated the core data models, updated the connection pooling
        configuration, and ran the first round of performance comparisons. The new setup is
        showing {metric} improvement on read-heavy workloads.

        Next steps: migrate the background job processing, update the monitoring dashboards,
        and run the full integration test suite against the new backend. {assignee} is
        handling the monitoring piece.

        One blocker: we discovered that the {component} batch processing job uses a feature
        that isn't supported in {subsystem} yet. I'm evaluating two workarounds and will
        have a recommendation by tomorrow. This might add {current_value} days to the
        timeline if we go with the rewrite approach.

        Will send another update at end of week.

        {sign_off}
      tone: casual
      is_reply: true
      tags: ["migration", "engineering", "infrastructure"]

    - subject_template: "CI/CD pipeline improvements — {component}"
      body_template: |
        {greeting},

        I've finished the CI/CD pipeline improvements for {component} that we discussed
        last month. Here's what changed and the impact so far.

        Build time is down from {threshold} minutes to {current_value} minutes thanks to
        better caching and parallelized test execution. The flaky test rate dropped from
        {percent} to under 1% after I quarantined the known flaky tests and added retries
        for the integration suite.

        New additions: I've added a deployment preview environment that spins up automatically
        on pull requests. Reviewers can now test changes in an isolated environment before
        merging. {assignee} helped configure the infrastructure for this.

        I also added security scanning to the pipeline. Every build now runs dependency
        vulnerability checks and container image scanning. Results appear as PR comments so
        developers see issues immediately.

        The pipeline configuration is in the repo under the {subsystem} directory. Let me
        know if you run into any issues.

        {sign_off}
      tone: casual
      is_reply: false
      tags: ["ci-cd", "engineering", "devops"]

    - subject_template: "Load testing results — {component} {version}"
      body_template: |
        {greeting},

        Sharing the load testing results for {component} {version} ahead of next week's
        release. We tested at 2x and 5x current peak traffic levels.

        At 2x load: all endpoints stayed within SLA. P99 latency for the {subsystem}
        endpoint was {current_value}, well under our {threshold} target. No errors
        observed across the full test duration.

        At 5x load: the {component} service held up but the {subsystem} started showing
        degradation at around 3.5x. Error rate climbed to {percent} and response times
        increased significantly. The bottleneck appears to be the database connection pool
        — we max out at the configured limit.

        Recommendation: we're safe for the near-term growth projections. For the {metric}
        milestone we're targeting in Q4, we'll need to increase the connection pool size
        and potentially add a read replica. {assignee} is putting together a capacity
        planning proposal.

        Full report with graphs is attached.

        {sign_off}
      tone: formal
      is_reply: false
      tags: ["load-testing", "engineering", "performance"]

    - subject_template: "Dependency upgrade — {component} to {version}"
      body_template: |
        {greeting},

        Heads up that I'm planning to upgrade {component}'s core dependency to {version}
        this sprint. The current version goes end-of-life on {date} and has two unpatched
        CVEs that our security scanner is flagging.

        I've tested the upgrade in a branch and the main changes that affect us are in the
        {subsystem} module. There's one breaking change in the API — the response format for
        batch operations now uses a different envelope structure. I've already updated our
        client code to handle both formats during the transition.

        The test suite passes with the new version. {assignee} did a review of the
        changelog and confirmed no other breaking changes affect our usage patterns.

        Rollout plan: merge to staging on {date}, run the full regression suite, and if
        clean, deploy to production the following day. The change is behind a feature flag
        so we can roll back quickly if needed.

        Any objections to proceeding?

        {sign_off}
      tone: casual
      is_reply: false
      tags: ["dependencies", "engineering", "security"]

    - subject_template: "Re: API rate limiting design for {component}"
      body_template: |
        {greeting},

        Thanks for the feedback on the rate limiting proposal. I've incorporated the
        suggestions and here's the updated design for the {component} API.

        We'll implement a token bucket algorithm at the {subsystem} gateway level. Default
        limits are {threshold} requests per minute for standard tier and {current_value}
        for premium tier. Burst allowance is set to {percent} above the sustained rate.

        When a client hits the limit, they'll receive a 429 response with Retry-After
        headers. The {component} SDK will handle automatic backoff on the client side.
        {assignee} is updating the SDK to support this.

        For internal services, we'll use a separate rate limit pool with higher thresholds
        to prevent cascading failures. The {metric} dashboard will show real-time consumption
        per client so we can proactively reach out before anyone hits their limits.

        Implementation timeline is two sprints. I'd like to ship the server-side changes
        first and give clients a 30-day grace period before enforcement begins.

        {sign_off}
      tone: formal
      is_reply: true
      tags: ["api-design", "engineering", "rate-limiting"]

    - subject_template: "Monitoring alert tuning — {component}"
      body_template: |
        {greeting},

        I've completed the monitoring alert tuning for {component} that we prioritized
        after last month's false alarm fatigue. Here's what changed.

        Removed: 4 alerts that hadn't produced a true positive in over 90 days. These
        were legacy thresholds from before the {subsystem} migration.

        Adjusted: the {component} latency alert threshold moved from {threshold} to
        {current_value} based on the new baseline after the optimization work. The
        error rate alert now uses a {metric}-minute sliding window instead of instantaneous
        readings to reduce noise.

        Added: a new composite alert that fires only when both latency and error rate
        degrade simultaneously. This should catch real incidents while filtering out
        transient spikes. {assignee} helped design the correlation logic.

        Results so far: in the two weeks since these changes, alert volume is down {percent}
        and the signal-to-noise ratio has improved significantly. No incidents were missed
        during this period.

        Let me know if your team is seeing similar alert fatigue — happy to help tune.

        {sign_off}
      tone: casual
      is_reply: false
      tags: ["monitoring", "engineering", "operations"]

    - subject_template: "Feature flag cleanup — {component} {version}"
      body_template: |
        {greeting},

        Time for our quarterly feature flag cleanup in {component}. We have {metric} flags
        in the system and several of them are stale.

        Flags to remove: the {subsystem} migration flag has been at 100% for over 60 days
        with no issues — safe to remove the old code path. The {component} experiment flag
        was concluded last sprint with a decision to ship — {assignee} will hardcode the
        winning variant.

        Flags to keep: the {version} rollout flag should stay until we've confirmed
        stability at {current_value} traffic. The {subsystem} kill switch stays permanently
        as our emergency fallback.

        I've created tickets for each flag removal. The total code cleanup should eliminate
        about {threshold} lines of dead code and simplify the conditional logic in
        {percent} of the affected modules.

        Please claim the tickets for flags in your area by {date}. Target completion is end
        of sprint.

        {sign_off}
      tone: casual
      is_reply: false
      tags: ["feature-flags", "engineering", "cleanup"]

  Sales:
    - subject_template: "Pipeline update — {client} deal status"
      body_template: |
        {greeting},

        Quick update on the {client} opportunity. Had a productive call with their
        procurement team today and things are moving in the right direction.

        They've confirmed budget allocation of {amount} for the {product} deployment. The
        decision timeline is end of {quarter}. Their main concern remains the integration
        with their existing {component} infrastructure, which is why I've looped in {assignee}
        from Engineering for a technical deep-dive next week.

        Competitive landscape: {client} is also evaluating one other vendor but our
        {product} demo scored highest in their evaluation matrix. The differentiator they
        keep coming back to is our {subsystem} capability.

        Next steps: technical architecture session on {date}, followed by a commercial
        proposal revision incorporating the volume discount they requested.

        I'll update the CRM after the technical session. Confidence level is at {percent}.

        {sign_off}
      tone: casual
      is_reply: false
      tags: ["pipeline", "sales", "deal"]

    - subject_template: "Re: {client} renewal — risk assessment"
      body_template: |
        {greeting},

        Following up on the {client} renewal conversation. After my check-in call with
        their VP of Engineering, I have some concerns we should discuss.

        They've been experiencing {component} latency issues for the past {metric} weeks
        and their satisfaction has dropped. While the Engineering team is working on a fix,
        {client} has mentioned they're evaluating alternatives for their {subsystem} needs.

        The renewal is worth {amount} annually and is up for renewal at the end of
        {quarter}. I think we need a proactive retention strategy. My proposal:

        First, get {assignee} from Engineering on a call with their technical team this
        week to address the performance issues directly. Second, offer a {percent} discount
        on the expanded {product} tier as an incentive to commit early. Third, set up
        quarterly business reviews going forward.

        Can we discuss this at tomorrow's pipeline review?

        {sign_off}
      tone: urgent
      is_reply: true
      tags: ["renewal", "sales", "risk"]

    - subject_template: "Quarterly territory review — {quarter}"
      body_template: |
        {greeting},

        Here's my territory review for {quarter}. Overall, the region is performing well
        against targets.

        Pipeline summary: {metric} qualified opportunities worth a combined {amount} in
        ARR. The largest deal is {client} at {current_value}, which I expect to close by
        {date}. Three other deals in the {threshold} range are progressing through
        procurement.

        Wins this quarter: closed {client} for {product} with a {percent} upsell from
        their initial scope. The {subsystem} add-on is gaining traction — four clients
        have expressed interest after seeing the demo at the industry conference.

        Challenges: the mid-market segment is slower than expected. Prospects are taking
        longer to move through evaluation due to budget constraints. I'm adjusting my
        approach to focus on ROI case studies and shorter proof-of-concept timelines.

        Request: I'd like approval to bring {assignee} to the {client} executive briefing
        next month. Having a technical resource in the room would help close this deal faster.

        {sign_off}
      tone: formal
      is_reply: false
      tags: ["territory", "sales", "quarterly-review"]

    - subject_template: "Competitive intel — {client} evaluation"
      body_template: |
        {greeting},

        Got some useful competitive intelligence from the {client} account that I want to
        share with the team.

        {client} shared their evaluation criteria and mentioned they're also looking at
        {component} as an alternative to our {product}. From what I gathered, {component}
        is pitching a lower price point but doesn't have feature parity on the {subsystem}
        side.

        Key differentiators working in our favor: our {product} handles {metric} concurrent
        connections versus their published limit of {threshold}. Our uptime SLA is also
        stronger at {current_value} versus their {percent} guarantee.

        Where they're competitive: their onboarding process is reportedly faster and they
        offer a free tier that lets prospects evaluate without procurement involvement.

        Recommendation: I think we should update our battle card for {component} and
        consider a streamlined trial process for mid-market accounts. {assignee} from
        Product might have insights on their latest feature releases.

        I'll present the full analysis at the next sales team meeting on {date}.

        {sign_off}
      tone: casual
      is_reply: false
      tags: ["competitive", "sales", "intelligence"]

    - subject_template: "Proposal submitted — {client} {product} deployment"
      body_template: |
        {greeting},

        Just submitted the formal proposal to {client} for the {product} deployment. Here's
        a summary of what we put in front of them.

        Scope: enterprise-tier {product} with the {subsystem} add-on, covering {metric}
        seats across their three offices. Implementation timeline is 8 weeks with dedicated
        onboarding support from our team.

        Pricing: {amount} annual contract with a {percent} multi-year discount if they
        commit to a 2-year term. This is within the range they indicated during discovery.
        {assignee} from Finance approved the discount structure.

        Key differentiators highlighted in the proposal: our {component} integration
        capability, the {current_value} uptime SLA, and the dedicated success manager
        they'll receive at this tier level.

        Expected timeline: they said they'll review internally over the next {metric}
        business days and get back to us with any questions. Decision expected by {date}.

        I feel good about this one. Will keep the team posted.

        {sign_off}
      tone: casual
      is_reply: false
      tags: ["proposal", "sales", "deal"]

    - subject_template: "Re: {client} contract negotiation — pricing discussion"
      body_template: |
        {greeting},

        Update on the {client} negotiation. Their procurement team came back with a
        counteroffer and I want to make sure we're aligned before I respond.

        They're asking for a {percent} reduction on the {product} license fee, bringing
        the annual contract value from {amount} to {current_value}. Their rationale is
        that they're committing to a larger seat count of {metric} users, which is above
        our standard enterprise tier threshold of {threshold}.

        My recommendation is to accept the volume-based discount but hold firm on the
        {subsystem} add-on pricing. The add-on margins are already thin and it's the module
        that delivers the most value in their use case. {assignee} from Finance can confirm
        the margin impact.

        I also want to push for a 2-year commitment if we offer the discounted rate. This
        locks in the revenue and reduces churn risk.

        Can we get a quick alignment call today before their deadline on {date}?

        {sign_off}
      tone: urgent
      is_reply: true
      tags: ["negotiation", "sales", "pricing"]

    - subject_template: "Weekly pipeline review — {date}"
      body_template: |
        {greeting},

        Here's the pipeline summary ahead of our weekly review meeting on {date}.

        Total pipeline value: {amount}. Weighted pipeline: {current_value}. We need
        {threshold} more in closed-won revenue to hit the {quarter} target.

        Deals moving forward: {client} is in final contract review and should close this
        week. Two mid-market opportunities in the {product} space progressed to technical
        evaluation stage.

        At risk: one enterprise deal has gone quiet after we submitted pricing. {assignee}
        is trying to reconnect with the champion. Another account pushed their evaluation
        to next {quarter} due to internal restructuring.

        New leads: generated {metric} new qualified leads from the conference last week.
        The {component} demo was particularly well received. I've started outreach and
        have initial calls booked for {percent} of them.

        Will walk through the details and forecasting adjustments in the meeting.

        {sign_off}
      tone: casual
      is_reply: false
      tags: ["pipeline", "sales", "weekly-review"]

    - subject_template: "Re: Quota update — {quarter} adjustments"
      body_template: |
        {greeting},

        Thanks for sharing the {quarter} quota adjustments. I've reviewed the numbers and
        have a few questions before I sign off.

        My revised target of {amount} reflects a {percent} increase over the previous
        quarter. I'm comfortable with this given the pipeline I have, but I want to flag
        that {metric} of my projected deals depend on the {product} launch happening on
        schedule. If that slips, I'll need the {component} backup deals to come through.

        Territory changes: I see that the {city} accounts have been reassigned to
        {assignee}. Can we discuss the transition plan for the two active opportunities
        there? I don't want to lose momentum with {client} — we've been building that
        relationship for {threshold} months.

        Regarding the new {subsystem} incentive structure, I think it will help drive
        adoption. Can you clarify whether renewals with {subsystem} upsells count toward
        the accelerator?

        Let's discuss at the next 1:1.

        {sign_off}
      tone: casual
      is_reply: true
      tags: ["quota", "sales", "territory"]

    - subject_template: "Client meeting recap — {client} {date}"
      body_template: |
        {greeting},

        Recapping today's meeting with {client}. Good progress overall — here are the
        key takeaways.

        Attendees from their side: VP Engineering, Head of IT, and their {component}
        team lead. From ours: myself, {assignee} from Engineering, and the SE.

        Key discussion points: they're looking to consolidate their {subsystem} vendors
        from three down to one. Our {product} covers {percent} of their requirements
        natively. The remaining gap is around {component} integrations, which {assignee}
        confirmed we can address in the next release.

        Their timeline: they want to make a vendor decision by {date} and begin
        implementation in {quarter}. Budget has been pre-approved at {amount} for the
        first year.

        Action items: send the {product} technical architecture document by Thursday,
        schedule a reference call with a similar-sized customer, and prepare a custom
        demo focused on their {subsystem} workflow.

        Confidence level: high. I'll update the forecast accordingly.

        {sign_off}
      tone: casual
      is_reply: false
      tags: ["meeting", "sales", "client"]

    - subject_template: "New lead — {client} inbound request"
      body_template: |
        {greeting},

        We received an inbound request from {client} through the website today. They're
        a {metric}-employee company in the {component} space and are looking for a
        {product} solution.

        Initial qualification: they have budget allocated for {quarter}, their current
        contract with their existing vendor expires on {date}, and the decision maker is
        their VP of Operations. They found us through the {subsystem} whitepaper we
        published last month.

        The estimated deal size is {amount} based on their seat count and the use case
        they described. They specifically mentioned needing the {component} integration
        and {current_value} uptime guarantees.

        I've scheduled a discovery call for this Thursday. {assignee} — would you be
        available to join as the technical resource? Their questions seem to be focused
        on {subsystem} scalability and they'd benefit from hearing directly from Engineering.

        Will report back after the call.

        {sign_off}
      tone: casual
      is_reply: false
      tags: ["lead", "sales", "inbound"]

    - subject_template: "Re: {product} demo feedback from {client}"
      body_template: |
        {greeting},

        Great news from the {client} demo. Their team was clearly impressed, and I
        wanted to share the feedback while it's fresh.

        What resonated most: the {subsystem} dashboard got the biggest reaction. Their
        current tool requires {metric} manual steps to accomplish what our {product} does
        automatically. The {component} integration demo also went well — they could see
        the direct time savings.

        Questions they asked: pricing for the enterprise tier at {threshold} seats,
        whether we support single sign-on through their identity provider, and the
        timeline for the {version} release that includes the feature they need.

        Concerns: they mentioned that their team has limited capacity for migration and
        asked about professional services. {assignee}, can you put together a scoping
        estimate for a guided migration?

