      is_reply: false
      tags: ["roadmap", "product", "planning"]

    - subject_template: "Feature spec — {component} integration"
      body_template: |
        {greeting},

        The feature spec for the {component} integration is ready for review. This is
        targeting the {version} release in {quarter}.

        Problem statement: {percent} of our enterprise prospects cite the lack of
        {component} integration as a blocker. The current workaround through the
        {subsystem} API is unreliable and requires {metric} hours of custom development
        from customers.

        Proposed solution: native {component} integration with bi-directional sync.
        Users configure the connection through the {product} settings page and data
        flows automatically. The sync runs every {threshold} minutes with conflict
        resolution handled by our algorithm.

        Scope: phase 1 covers read and write operations for the core {component} objects.
        Phase 2 adds real-time webhooks and custom field mapping. {assignee} from Engineering
        estimates {metric} sprints for phase 1 and {threshold} for phase 2.

        Success metrics: {metric} enterprise customers adopt the integration within 90 days
        of launch, {component} related support tickets decrease by {percent}, and the
        feature contributes to {amount} in new ARR.

        Please review the full spec in Confluence and leave comments by {date}.

        {sign_off}
      tone: formal
      is_reply: false
      tags: ["feature-spec", "product", "integration"]

    - subject_template: "Re: User research findings — {component}"
      body_template: |
        {greeting},

        Sharing the findings from the {component} user research study. We interviewed
        {metric} users and ran usability tests with {threshold} participants over the
        last two weeks.

        Key insight 1: users find the {subsystem} workflow confusing — {percent} of
        participants couldn't complete the primary task without help. The main friction
        point is the navigation between {component} and the main {product} dashboard.

        Key insight 2: power users want more {component} customization options. They're
        currently using workarounds that involve {metric} extra steps. The most requested
        feature is the ability to create custom {subsystem} templates.

        Key insight 3: new users consistently miss the {component} feature entirely.
        Discovery is poor — only {percent} of new users try the feature within their first
        {metric} days. {assignee} suggested adding an onboarding tooltip, which tested
        well in the mock-up.

        Recommendations: redesign the {subsystem} navigation flow, add the template
        feature to the {quarter} roadmap, and implement the onboarding changes as a quick
        win. Estimated impact is a {percent} improvement in feature adoption.

        Full research report with recordings is in the research repository.

        {sign_off}
      tone: casual
      is_reply: true
      tags: ["research", "product", "ux"]

    - subject_template: "A/B test results — {component} experiment"
      body_template: |
        {greeting},

        The {component} A/B test has reached statistical significance and I'm sharing the
        results. The experiment ran for {metric} days with {threshold} users in each cohort.

        Variant A (control): the existing {subsystem} flow. Conversion rate of
        {current_value} with an average task completion time of {metric} seconds.

        Variant B (treatment): the redesigned flow with the simplified {component} step.
        Conversion rate of {threshold} with task completion time of {current_value} seconds.
        This represents a {percent} improvement in conversion and {metric} percent reduction
        in task time.

        Secondary metrics: user satisfaction score improved from {metric} to {threshold}
        in the treatment group. Support ticket volume for {component} related issues
        decreased by {percent}. No negative impact on {subsystem} engagement or retention.

        Recommendation: ship Variant B to 100% of users. The lift is meaningful and
        consistent across all user segments. {assignee} from Engineering can have this
        deployed by {date}.

        One caveat: the test population skewed toward {product} power users. We should
        monitor new user behavior closely for the first {metric} weeks after full rollout.

        {sign_off}
      tone: casual
      is_reply: false
      tags: ["ab-test", "product", "experiment"]

