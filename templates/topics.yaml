    - subject_template: "Re: {product} pricing discussion — {component} tier"
      body_template: |
        {greeting},

        Following up on the {product} pricing discussion. I've modeled three options for
        the {component} tier based on the competitive analysis and customer willingness-to-pay
        data.

        Option A: {amount} per seat per month. This is price-competitive with the market
        and would maximize adoption. Projected take rate is {percent} of our existing base.
        Downside: it undercuts our current {subsystem} pricing and may trigger downgrades.

        Option B: {current_value} per seat per month with the {subsystem} add-on bundled.
        Higher price point but stronger value perception. {metric} of the {threshold}
        customers we surveyed preferred this packaging. {assignee} from Sales thinks this
        is the sweet spot for enterprise buyers.

        Option C: usage-based pricing at {amount} per {component} transaction. This aligns
        with the value delivered but introduces billing complexity. Only {percent} of
        surveyed customers preferred this model.

        My recommendation: Option B. It captures the most value, simplifies the packaging,
        and positions us well against the competition. The estimated revenue impact is
        {amount} in incremental ARR over {metric} months.

        Can we finalize the pricing decision by {date}? Sales needs {threshold} weeks to
        update collateral before we announce.

